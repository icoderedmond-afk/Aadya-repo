<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Game of Wisdom</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border-radius: 12px;
      overflow: hidden;
      border: 4px solid #334155;
    }
    canvas {
      background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
      display: block;
      cursor: crosshair;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay h1 {
      font-size: 44px;
      margin-bottom: 5px;
      color: #f59e0b;
      text-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
      letter-spacing: 2px;
    }
    #overlay p {
      font-size: 18px;
      margin-bottom: 15px;
      color: #cbd5e1;
    }
    #medal-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    #medal-icon {
      font-size: 60px;
      margin-bottom: 5px;
    }
    #medal-title {
      font-size: 22px;
      font-weight: bold;
      color: #38bdf8;
    }
    .btn {
      background: #d97706;
      color: #fff;
      border: none;
      padding: 12px 30px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
    }
    .btn:hover {
      background: #f59e0b;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="ui">
    <div id="score">WISDOM: 0</div>
    <div id="timer">TIME: 30</div>
  </div>
  
  <div id="overlay">
    <h1 id="title">THE GAME OF WISDOM</h1>
    <p id="subtitle">Slice wisdom orbs to prove your enlightenment in 30 seconds!</p>
    
    <div id="medal-container">
      <div id="medal-icon">🏅</div>
      <div id="medal-title">Medal Earned</div>
    </div>

    <button class="btn" id="start-btn" onclick="startGame()">BEGIN TRIAL</button>
  </div>

  <canvas id="canvas" width="800" height="600"></canvas>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const timerEl = document.getElementById('timer');
  const overlay = document.getElementById('overlay');
  const titleEl = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const startBtn = document.getElementById('start-btn');
  const medalContainer = document.getElementById('medal-container');
  const medalIcon = document.getElementById('medal-icon');
  const medalTitle = document.getElementById('medal-title');

  // Game state
  let score = 0;
  let timeLeft = 30;
  let gameInterval = null;
  let timerInterval = null;
  let isPlaying = false;

  // Mouse / Touch slice trail
  let sliceTrail = [];
  let isMouseDown = false;

  // Game objects
  let fruits = [];
  let particles = [];
  let slicedHalves = [];

  // Medal Tiers based on score
  const MEDALS = [
    { minScore: 400, name: 'Wisdom Master Medal', icon: '💎', color: '#38bdf8' },
    { minScore: 250, name: 'Gold Scholar Medal', icon: '🥇', color: '#fbbf24' },
    { minScore: 150, name: 'Silver Sage Medal', icon: '🥈', color: '#94a3b8' },
    { minScore: 50,  name: 'Bronze Apprentice Medal', icon: '🥉', color: '#d97706' },
    { minScore: 0,   name: 'Novice Badge', icon: '📜', color: '#a855f7' }
  ];

  // Wisdom Orbs / Fruits
  const FRUIT_TYPES = [
    {
      name: 'Watermelon',
      radius: 40,
      points: 10,
      draw: (ctx, r) => {
        ctx.fillStyle = '#1e5128';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#4e9f3d';
        ctx.lineWidth = 4;
        for (let i = -r + 5; i < r; i += 12) {
          ctx.beginPath();
          ctx.arc(0, 0, r - 2, (i / r), (i / r) + 0.5);
          ctx.stroke();
        }

        ctx.fillStyle = '#d82148';
        ctx.beginPath();
        ctx.arc(0, 0, r - 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#111';
        const seedAngles = [0.2, 1.2, 2.5, 3.8, 5.0];
        seedAngles.forEach(angle => {
          let sx = Math.cos(angle) * (r * 0.4);
          let sy = Math.sin(angle) * (r * 0.4);
          ctx.beginPath();
          ctx.ellipse(sx, sy, 2, 4, angle, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    },
    {
      name: 'Orange',
      radius: 32,
      points: 15,
      draw: (ctx, r) => {
        ctx.fillStyle = '#ff8c00';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath();
        ctx.arc(-r * 0.3, -r * 0.3, r * 0.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#556b2f';
        ctx.beginPath();
        ctx.arc(0, -r + 2, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2e8b57';
        ctx.beginPath();
        ctx.ellipse(4, -r - 2, 8, 4, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();
      }
    },
    {
      name: 'Apple',
      radius: 35,
      points: 12,
      draw: (ctx, r) => {
        ctx.fillStyle = '#e63946';
        ctx.beginPath();
        ctx.arc(-r * 0.25, 0, r * 0.75, 0, Math.PI * 2);
        ctx.arc(r * 0.25, 0, r * 0.75, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.beginPath();
        ctx.arc(-r * 0.4, -r * 0.3, r * 0.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#4a2e18';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.6);
        ctx.quadraticCurveTo(-5, -r - 8, -2, -r - 12);
        ctx.stroke();

        ctx.fillStyle = '#70e000';
        ctx.beginPath();
        ctx.ellipse(3, -r - 8, 7, 3, -Math.PI / 6, 0, Math.PI * 2);
        ctx.fill();
      }
    },
    {
      name: 'Coconut',
      radius: 36,
      points: 20,
      draw: (ctx, r) => {
        ctx.fillStyle = '#5c3d2e';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#3d2314';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r - 3, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#2b170c';
        [-8, 0, 8].forEach((x, i) => {
          let y = i === 1 ? -6 : 4;
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }
  ];

  class Fruit {
    constructor() {
      const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
      this.type = type;
      this.radius = type.radius;
      this.points = type.points;

      this.x = Math.random() * (canvas.width - 160) + 80;
      this.y = canvas.height + this.radius;

      this.vx = (Math.random() - 0.5) * 6;
      this.vy = -(Math.random() * 4 + 13);
      this.gravity = 0.28;

      this.rotation = Math.random() * Math.PI * 2;
      this.vRot = (Math.random() - 0.5) * 0.08;

      this.sliced = false;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.rotation += this.vRot;
    }

    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      this.type.draw(ctx, this.radius);
      ctx.restore();
    }
  }

  class SlicedHalf {
    constructor(x, y, radius, type, angle, isRightHalf) {
      this.x = x;
      this.y = y;
      this.radius = radius;
      this.type = type;
      this.angle = angle;
      this.isRightHalf = isRightHalf;

      const side = isRightHalf ? 1 : -1;
      this.vx = Math.cos(angle + Math.PI / 2) * 3 * side + (Math.random() - 0.5) * 2;
      this.vy = Math.sin(angle + Math.PI / 2) * 3 * side - 2;
      this.gravity = 0.35;

      this.rotation = angle;
      this.vRot = side * 0.1;
      this.alpha = 1;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.rotation += this.vRot;
      this.alpha -= 0.015;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);

      ctx.beginPath();
      if (this.isRightHalf) {
        ctx.rect(0, -this.radius * 1.5, this.radius * 1.5, this.radius * 3);
      } else {
        ctx.rect(-this.radius * 1.5, -this.radius * 1.5, this.radius * 1.5, this.radius * 3);
      }
      ctx.clip();

      this.type.draw(ctx, this.radius);
      ctx.restore();
    }
  }

  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.color = color;
      this.radius = Math.random() * 4 + 2;
      this.vx = (Math.random() - 0.5) * 8;
      this.vy = (Math.random() - 0.5) * 8;
      this.gravity = 0.2;
      this.alpha = 1;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.alpha -= 0.03;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Input Handlers
  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  window.addEventListener('mousedown', (e) => {
    isMouseDown = true;
    sliceTrail = [];
    sliceTrail.push(getMousePos(e));
  });

  window.addEventListener('mouseup', () => { isMouseDown = false; });

  window.addEventListener('mousemove', (e) => {
    if (!isPlaying) return;
    const pos = getMousePos(e);
    if (isMouseDown) {
      sliceTrail.push(pos);
      checkSlice(pos);
    }
  });

  window.addEventListener('touchstart', (e) => {
    isMouseDown = true;
    sliceTrail = [];
    sliceTrail.push(getMousePos(e.touches[0]));
  });

  window.addEventListener('touchend', () => { isMouseDown = false; });

  window.addEventListener('touchmove', (e) => {
    if (!isPlaying) return;
    const pos = getMousePos(e.touches[0]);
    sliceTrail.push(pos);
    checkSlice(pos);
  });

  function checkSlice(currentPos) {
    if (sliceTrail.length < 2) return;
    const prevPos = sliceTrail[sliceTrail.length - 2];

    fruits.forEach(fruit => {
      if (fruit.sliced) return;

      const dist = distToSegment(fruit, prevPos, currentPos);
      if (dist < fruit.radius) {
        fruit.sliced = true;
        score += fruit.points;
        scoreEl.innerText = `WISDOM: ${score}`;

        const sliceAngle = Math.atan2(currentPos.y - prevPos.y, currentPos.x - prevPos.x);

        slicedHalves.push(new SlicedHalf(fruit.x, fruit.y, fruit.radius, fruit.type, sliceAngle, false));
        slicedHalves.push(new SlicedHalf(fruit.x, fruit.y, fruit.radius, fruit.type, sliceAngle, true));

        const juiceColor = fruit.type.name === 'Watermelon' ? '#d82148' : 
                           fruit.type.name === 'Orange' ? '#ff8c00' : 
                           fruit.type.name === 'Apple' ? '#f4a261' : '#fefae0';
        for (let i = 0; i < 12; i++) {
          particles.push(new Particle(fruit.x, fruit.y, juiceColor));
        }
      }
    });
  }

  function distToSegment(p, v, w) {
    const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
  }

  function startGame() {
    score = 0;
    timeLeft = 30;
    fruits = [];
    particles = [];
    slicedHalves = [];
    sliceTrail = [];
    isPlaying = true;

    scoreEl.innerText = `WISDOM: ${score}`;
    timerEl.innerText = `TIME: ${timeLeft}`;
    overlay.style.display = 'none';
    medalContainer.style.display = 'none';

    clearInterval(gameInterval);
    gameInterval = setInterval(() => {
      if (!isPlaying) return;
      const count = Math.floor(Math.random() * 3) + 1;
      for (let i = 0; i < count; i++) {
        fruits.push(new Fruit());
      }
    }, 1000);

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.innerText = `TIME: ${timeLeft}`;
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);

    requestAnimationFrame(updateGame);
  }

  function endGame() {
    isPlaying = false;
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    // Determine Medal Earned
    const earnedMedal = MEDALS.find(m => score >= m.minScore);

    titleEl.innerText = "TRIAL COMPLETED";
    subtitleEl.innerText = `Total Wisdom Acquired: ${score}`;
    
    medalIcon.innerText = earnedMedal.icon;
    medalTitle.innerText = earnedMedal.name;
    medalTitle.style.color = earnedMedal.color;
    medalContainer.style.display = 'flex';

    startBtn.innerText = "RETRY TRIAL";
    overlay.style.display = 'flex';
  }

  function updateGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = fruits.length - 1; i >= 0; i--) {
      const f = fruits[i];
      f.update();
      f.draw();
      if (f.sliced || f.y > canvas.height + 100) {
        fruits.splice(i, 1);
      }
    }

    for (let i = slicedHalves.length - 1; i >= 0; i--) {
      const h = slicedHalves[i];
      h.update();
      h.draw();
      if (h.alpha <= 0 || h.y > canvas.height + 100) {
        slicedHalves.splice(i, 1);
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update();
      p.draw();
      if (p.alpha <= 0) {
        particles.splice(i, 1);
      }
    }

    if (sliceTrail.length > 1) {
      ctx.save();
      ctx.strokeStyle = '#f59e0b';
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 12;
      ctx.lineCap = 'round';

      for (let i = 1; i < sliceTrail.length; i++) {
        const progress = i / sliceTrail.length;
        ctx.beginPath();
        ctx.lineWidth = progress * 8;
        ctx.moveTo(sliceTrail[i - 1].x, sliceTrail[i - 1].y);
        ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
        ctx.stroke();
      }
      ctx.restore();

      sliceTrail.shift();
    }

    if (isPlaying) {
      requestAnimationFrame(updateGame);
    }
  }
</script>

</body>
</html>
