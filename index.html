<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ping Pong</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #55ff55;
            text-shadow: 3px 3px #005500;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        canvas {
            background-color: #000;
            display: block;
            image-rendering: pixelated; /* Preserves crisp pixel look */
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 10px;
            color: #aaa;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <h1>PIXEL PONG</h1>

    <div id="game-container">
        <canvas id="pongCanvas" width="600" height="400"></canvas>
    </div>

    <div class="controls-hint">
        Player: [W] Up | [S] Down<br>
        Press [SPACE] to Restart when Game Over
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Turn off image smoothing for pixel art aesthetic
        ctx.imageSmoothingEnabled = false;

        // Game Configuration
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 60;
        const BALL_SIZE = 10;
        const PADDLE_SPEED = 6;
        const WINNING_SCORE = 5;

        // Game State
        let playerY = (canvas.height - PADDLE_HEIGHT) / 2;
        let aiY = (canvas.height - PADDLE_HEIGHT) / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 4;
        let ballSpeedY = 3;

        let playerScore = 0;
        let aiScore = 0;
        let gameOver = false;

        // Input Tracking
        const keys = {
            w: false,
            s: false
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.code === 'Space' && gameOver) resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
        });

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            // Reverse direction towards the scoring player
            ballSpeedX = -ballSpeedX;
            // Normalize speed
            ballSpeedX = ballSpeedX > 0 ? 4 : -4;
            ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2);
        }

        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            gameOver = false;
            resetBall();
        }

        function update() {
            if (gameOver) return;

            // Player Movement
            if (keys.w && playerY > 0) {
                playerY -= PADDLE_SPEED;
            }
            if (keys.s && playerY < canvas.height - PADDLE_HEIGHT) {
                playerY += PADDLE_SPEED;
            }

            // Simple AI Movement (tracks ball with slight delay)
            const aiCenter = aiY + PADDLE_HEIGHT / 2;
            if (aiCenter < ballY - 10 && aiY < canvas.height - PADDLE_HEIGHT) {
                aiY += PADDLE_SPEED * 0.75;
            } else if (aiCenter > ballY + 10 && aiY > 0) {
                aiY -= PADDLE_SPEED * 0.75;
            }

            // Ball Movement
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Top and Bottom Wall Collisions
            if (ballY <= 0 || ballY + BALL_SIZE >= canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            // Player Paddle Collision
            if (
                ballX <= PADDLE_WIDTH + 20 &&
                ballY + BALL_SIZE >= playerY &&
                ballY <= playerY + PADDLE_HEIGHT
            ) {
                ballSpeedX = -ballSpeedX;
                ballSpeedX *= 1.05; // Slightly increase speed on hit
                // Change angle based on hit position
                let deltaY = ballY - (playerY + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.2;
            }

            // AI Paddle Collision
            if (
                ballX + BALL_SIZE >= canvas.width - PADDLE_WIDTH - 20 &&
                ballY + BALL_SIZE >= aiY &&
                ballY <= aiY + PADDLE_HEIGHT
            ) {
                ballSpeedX = -ballSpeedX;
                ballSpeedX *= 1.05;
                let deltaY = ballY - (aiY + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.2;
            }

            // Scoring
            if (ballX < 0) {
                aiScore++;
                checkWin();
                if (!gameOver) resetBall();
            } else if (ballX > canvas.width) {
                playerScore++;
                checkWin();
                if (!gameOver) resetBall();
            }
        }

        function checkWin() {
            if (playerScore >= WINNING_SCORE || aiScore >= WINNING_SCORE) {
                gameOver = true;
            }
        }

        function drawDottedLine() {
            ctx.fillStyle = '#fff';
            for (let i = 10; i < canvas.height; i += 25) {
                ctx.fillRect(canvas.width / 2 - 2, i, 4, 15);
            }
        }

        function draw() {
            // Clear Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Net
            drawDottedLine();

            // Draw Player Paddle
            ctx.fillStyle = '#ff5555'; // Red retro hue
            ctx.fillRect(20, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Draw AI Paddle
            ctx.fillStyle = '#5555ff'; // Blue retro hue
            ctx.fillRect(canvas.width - 20 - PADDLE_WIDTH, aiY, PADDLE_WIDTH, PADDLE_HEIGHT);

            // Draw Ball (Pixel Square)
            ctx.fillStyle = '#ffff55'; // Yellow retro hue
            ctx.fillRect(ballX, ballY, BALL_SIZE, BALL_SIZE);

            // Draw Scores
            ctx.fillStyle = '#fff';
            ctx.font = '20px "Press Start 2P"';
            ctx.fillText(playerScore, canvas.width / 4, 50);
            ctx.fillText(aiScore, (canvas.width / 4) * 3, 50);

            // Draw Game Over Screen
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.font = '16px "Press Start 2P"';
                ctx.textAlign = 'center';

                if (playerScore >= WINNING_SCORE) {
                    ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 20);
                } else {
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                }

                ctx.font = '10px "Press Start 2P"';
                ctx.fillText('PRESS SPACE TO RESTART', canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = 'left'; // Reset alignment
            }
        }

        // Game Loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
